<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI考古題">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="iPAS AI應用規劃師（中級）考古題測驗 - 離線版">
    <title>iPAS AI應用規劃師（中級）考古題測驗</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%23667eea' width='180' height='180' rx='20'/%3E%3Ctext x='90' y='115' font-size='70' text-anchor='middle' fill='white'%3EAI%3C/text%3E%3C/svg%3E">
    <style>
        /* Base styles with touch optimization */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        html {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height for mobile */
            padding: 10px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Offline indicator */
        .offline-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ff6b6b;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .offline-indicator.show {
            display: block;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        /* Install prompt */
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 90%;
            width: auto;
        }

        .install-prompt.show {
            display: flex;
        }

        .install-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            min-height: calc(100vh - 20px);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .header p {
            opacity: 0.9;
            font-size: clamp(0.85rem, 3vw, 0.95rem);
        }

        .content {
            padding: 20px;
        }

        /* Setup section */
        .setup-section {
            text-align: center;
            padding: 20px 10px;
        }

        .setup-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
        }

        .question-count-selector {
            margin: 20px 0;
        }

        .question-count-selector label {
            display: block;
            margin-bottom: 12px;
            color: #555;
            font-size: 1rem;
        }

        .count-options {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .count-btn {
            padding: 12px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            min-height: 44px; /* Touch target size */
            min-width: 60px;
        }

        .count-btn:active, .count-btn:hover, .count-btn.active {
            background: #667eea;
            color: white;
        }

        .start-btn {
            margin-top: 25px;
            padding: 16px 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            min-height: 50px;
            min-width: 150px;
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .stats-info {
            margin-top: 25px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            color: #666;
            font-size: 0.95rem;
        }

        /* Quiz section */
        .quiz-section {
            display: none;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-bottom: 10px;
            color: #666;
            font-size: 0.9rem;
        }

        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 15px 0;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            max-height: 120px;
            overflow-y: auto;
        }

        .nav-dot {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #e9ecef;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            min-height: 36px;
            min-width: 36px;
        }

        .nav-dot:active, .nav-dot:hover {
            border-color: #667eea;
        }

        .nav-dot.current {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .nav-dot.answered {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: clamp(1rem, 3.5vw, 1.15rem);
            color: #333;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            padding: 14px 16px;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 50px;
        }

        .option:active, .option:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .option-letter {
            font-weight: bold;
            margin-right: 12px;
            min-width: 25px;
            font-size: 1rem;
        }

        .option-text {
            flex: 1;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .explanation {
            display: none;
            margin-top: 16px;
            padding: 16px;
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            border-radius: 0 10px 10px 0;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .explanation-text {
            color: #555;
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }

        .nav-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            min-height: 50px;
            flex: 1;
        }

        .nav-btn.prev {
            background: #e9ecef;
            color: #555;
        }

        .nav-btn.next, .nav-btn.submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .nav-btn:active {
            transform: scale(0.98);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Result section */
        .result-section {
            display: none;
            text-align: center;
            padding: 20px 10px;
        }

        .result-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: clamp(1.3rem, 4vw, 1.8rem);
        }

        .score-circle {
            width: min(160px, 40vw);
            height: min(160px, 40vw);
            min-width: 120px;
            min-height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-number {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: bold;
        }

        .score-total {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-box {
            padding: 16px 10px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-value {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .result-message {
            font-size: 1.1rem;
            color: #555;
            margin: 16px 0;
        }

        .review-section {
            margin-top: 30px;
            text-align: left;
        }

        .review-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .review-status {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .review-status.correct {
            background: #d4edda;
            color: #155724;
        }

        .review-status.wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .review-answer {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .review-explanation {
            margin-top: 12px;
            padding: 12px;
            background: #e7f3ff;
            border-radius: 8px;
            color: #555;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            min-height: 50px;
            min-width: 120px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .action-btn.secondary {
            background: #e9ecef;
            color: #555;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .header {
                padding: 16px;
            }

            .content {
                padding: 16px;
            }

            .count-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .start-btn {
                padding: 14px 40px;
                font-size: 1rem;
            }

            .question-card {
                padding: 16px;
            }

            .option {
                padding: 12px 14px;
            }

            .nav-btn {
                padding: 12px 18px;
                font-size: 0.95rem;
            }

            .result-stats {
                gap: 8px;
            }

            .stat-box {
                padding: 12px 8px;
            }

            .action-btn {
                padding: 12px 24px;
                font-size: 0.95rem;
            }
        }

        /* iPhone safe area support */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }

            @media (max-width: 480px) {
                body {
                    padding-left: env(safe-area-inset-left);
                    padding-right: env(safe-area-inset-right);
                    padding-bottom: env(safe-area-inset-bottom);
                }
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            }

            .container {
                background: #1a202c;
            }

            .header {
                background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            }

            .question-card, .stats-info, .review-item, .stat-box {
                background: #2d3748;
            }

            .question-text, .setup-section h2, .result-section h2 {
                color: #e2e8f0;
            }

            .option {
                background: #1a202c;
                border-color: #4a5568;
                color: #e2e8f0;
            }

            .option:hover, .option:active {
                background: #2d3748;
                border-color: #667eea;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="offline-indicator" id="offlineIndicator">
        📴 離線模式 - 仍可正常使用
    </div>

    <div class="install-prompt" id="installPrompt">
        <span>安裝到主畫面，離線使用更方便</span>
        <button class="install-btn" onclick="installApp()">安裝</button>
    </div>

    <div class="container">
        <div class="header">
            <h1>📚 iPAS AI應用規劃師（中級）</h1>
            <p>考古題互動測驗系統</p>
        </div>

        <div class="content">
            <!-- Setup Page -->
            <div class="setup-section" id="setupSection">
                <h2>🎯 開始測驗</h2>
                <p style="color: #666; margin-bottom: 20px;">選擇題目數量，系統將隨機出題</p>

                <div class="question-count-selector">
                    <label>選擇題目數量：</label>
                    <div class="count-options">
                        <button class="count-btn" data-count="10">10題</button>
                        <button class="count-btn" data-count="20">20題</button>
                        <button class="count-btn active" data-count="30">30題</button>
                        <button class="count-btn" data-count="50">50題</button>
                    </div>
                </div>

                <div class="stats-info">
                    <p>📊 題庫統計</p>
                    <p style="margin-top: 10px;">目前題庫共有 <strong id="totalQuestions">134</strong> 道考古題</p>
                    <p style="margin-top: 5px; font-size: 0.9rem;">✅ 支援離線使用，無需網路</p>
                </div>

                <button class="start-btn" onclick="startQuiz()">開始測驗</button>
            </div>

            <!-- Quiz Page -->
            <div class="quiz-section" id="quizSection">
                <div class="progress-text">
                    題目 <span id="currentQuestionNum">1</span> / <span id="totalQuestionNum">30</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>

                <div class="question-nav" id="questionNav"></div>

                <div class="question-card" id="questionCard">
                    <div class="question-number" id="questionNumber">題目 1</div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="explanation" id="explanationBox">
                        <div class="explanation-title">📖 答案解析</div>
                        <div class="explanation-text" id="explanationText"></div>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button class="nav-btn prev" id="prevBtn" onclick="previousQuestion()">← 上一題</button>
                    <button class="nav-btn next" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
                    <button class="nav-btn submit hidden" id="submitBtn" onclick="submitQuiz()">提交測驗 ✓</button>
                </div>
            </div>

            <!-- Result Page -->
            <div class="result-section" id="resultSection">
                <h2>🎉 測驗完成！</h2>

                <div class="score-circle">
                    <div class="score-number" id="scoreNumber">0</div>
                    <div class="score-total">/<span id="scoreTotal">30</span></div>
                </div>

                <div class="result-message" id="resultMessage"></div>

                <div class="result-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="correctCount">0</div>
                        <div class="stat-label">答對題數</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="wrongCount">0</div>
                        <div class="stat-label">答錯題數</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="accuracyRate">0%</div>
                        <div class="stat-label">正確率</div>
                    </div>
                </div>

                <div class="review-section" id="reviewSection">
                    <h3 style="margin-bottom: 16px; color: #333; font-size: 1.1rem;">📋 詳細解析</h3>
                    <div id="reviewList"></div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn primary" onclick="restartQuiz()">重新測驗</button>
                    <button class="action-btn secondary" onclick="exportResults()">匯出結果</button>
                </div>
            </div>
        </div>
    </div>

        // Global variables
        let selectedQuestionCount = 30;
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let isSubmitted = false;
        let deferredPrompt = null;

        // DOM elements
        const setupSection = document.getElementById('setupSection');
        const quizSection = document.getElementById('quizSection');
        const resultSection = document.getElementById('resultSection');

        // Register Service Worker for offline support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('SW registered:', registration);
                })
                .catch((error) => {
                    console.log('SW registration failed:', error);
                });
        }

        // Handle offline/online status
        function updateOnlineStatus() {
            const indicator = document.getElementById('offlineIndicator');
            if (navigator.onLine) {
                indicator.classList.remove('show');
            } else {
                indicator.classList.add('show');
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // PWA Install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').classList.add('show');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted install');
                    }
                    document.getElementById('installPrompt').classList.remove('show');
                    deferredPrompt = null;
                });
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.count-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedQuestionCount = parseInt(this.dataset.count);
                });
            });

            document.getElementById('totalQuestions').textContent = questionBank.length;

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (quizSection.style.display === 'block' && !isSubmitted) {
                    if (e.key === 'ArrowLeft') previousQuestion();
                    if (e.key === 'ArrowRight') nextQuestion();
                    if (e.key >= '1' && e.key <= '4') {
                        selectAnswer(String.fromCharCode(64 + parseInt(e.key)));
                    }
                }
            });
        });

        function startQuiz() {
            currentQuestions = getRandomQuestions(selectedQuestionCount);
            currentQuestionIndex = 0;
            userAnswers = {};
            isSubmitted = false;

            document.getElementById('totalQuestionNum').textContent = currentQuestions.length;
            generateQuestionNav();
            showQuestion(0);

            setupSection.classList.add('hidden');
            quizSection.style.display = 'block';
        }

        function getRandomQuestions(count) {
            const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, Math.min(count, shuffled.length));
        }

        function generateQuestionNav() {
            const nav = document.getElementById('questionNav');
            nav.innerHTML = '';
            for (let i = 0; i < currentQuestions.length; i++) {
                const dot = document.createElement('div');
                dot.className = 'nav-dot';
                dot.textContent = i + 1;
                dot.onclick = () => goToQuestion(i);
                nav.appendChild(dot);
            }
        }

        function showQuestion(index) {
            currentQuestionIndex = index;
            const question = currentQuestions[index];

            document.getElementById('currentQuestionNum').textContent = index + 1;
            document.getElementById('progressFill').style.width =
                ((index + 1) / currentQuestions.length * 100) + '%';

            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.remove('current', 'answered');
                if (i === index) dot.classList.add('current');
                if (userAnswers[currentQuestions[i].id] !== undefined) dot.classList.add('answered');
            });

            document.getElementById('questionNumber').textContent = `題目 ${index + 1}`;
            document.getElementById('questionText').textContent = question.question;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const optionLetters = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, i) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (userAnswers[question.id] === optionLetters[i]) {
                    optionDiv.classList.add('selected');
                }

                if (isSubmitted) {
                    if (optionLetters[i] === question.answer) {
                        optionDiv.classList.add('correct');
                    } else if (userAnswers[question.id] === optionLetters[i]) {
                        optionDiv.classList.add('wrong');
                    }
                }

                optionDiv.innerHTML = `
                    <span class="option-letter">${optionLetters[i]}</span>
                    <span class="option-text">${option}</span>
                `;

                if (!isSubmitted) {
                    optionDiv.onclick = () => selectAnswer(optionLetters[i]);
                }

                optionsContainer.appendChild(optionDiv);
            });

            const explanationBox = document.getElementById('explanationBox');
            if (isSubmitted && question.explanation) {
                explanationBox.classList.add('show');
                document.getElementById('explanationText').textContent = question.explanation;
            } else {
                explanationBox.classList.remove('show');
            }

            document.getElementById('prevBtn').disabled = index === 0;

            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');

            if (index === currentQuestions.length - 1) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
                submitBtn.disabled = Object.keys(userAnswers).length === 0;
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }
        }

        function selectAnswer(answer) {
            userAnswers[currentQuestions[currentQuestionIndex].id] = answer;
            showQuestion(currentQuestionIndex);
        }

        function goToQuestion(index) {
            showQuestion(index);
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                showQuestion(currentQuestionIndex - 1);
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                showQuestion(currentQuestionIndex + 1);
            }
        }

        function submitQuiz() {
            if (!confirm('確定要提交測驗嗎？提交後將無法修改答案。')) {
                return;
            }

            isSubmitted = true;

            let correct = 0;
            currentQuestions.forEach(q => {
                if (userAnswers[q.id] === q.answer) {
                    correct++;
                }
            });

            const total = currentQuestions.length;
            const wrong = total - correct;
            const accuracy = Math.round(correct / total * 100);

            document.getElementById('scoreNumber').textContent = correct;
            document.getElementById('scoreTotal').textContent = total;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('accuracyRate').textContent = accuracy + '%';

            let message = '';
            if (accuracy >= 80) {
                message = '🌟 表現優異！繼續保持！';
            } else if (accuracy >= 60) {
                message = '👍 表現不錯！還有進步空間！';
            } else {
                message = '💪 繼續加油！多練習會更好！';
            }
            document.getElementById('resultMessage').textContent = message;

            generateReviewList();

            quizSection.style.display = 'none';
            resultSection.style.display = 'block';
            window.scrollTo(0, 0);
        }

        function generateReviewList() {
            const reviewList = document.getElementById('reviewList');
            reviewList.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                const userAnswer = userAnswers[q.id] || '未作答';
                const isCorrect = userAnswer === q.answer;

                const reviewItem = document.createElement('div');
                reviewItem.className = 'review-item';
                reviewItem.innerHTML = `
                    <div class="review-header">
                        <strong>題目 ${index + 1}</strong>
                        <span class="review-status ${isCorrect ? 'correct' : 'wrong'}">
                            ${isCorrect ? '✓ 正確' : '✗ 錯誤'}
                        </span>
                    </div>
                    <div class="question-text" style="margin-bottom: 10px; font-size: 0.95rem;">${q.question}</div>
                    <div class="review-answer">
                        <div>您的答案：<strong style="color: ${isCorrect ? '#28a745' : '#dc3545'}">${userAnswer}</strong></div>
                        <div>正確答案：<strong style="color: #28a745">${q.answer}</strong></div>
                    </div>
                    ${q.explanation ? `
                    <div class="review-explanation">
                        <strong>📖 解析：</strong>${q.explanation}
                    </div>
                    ` : ''}
                    <div style="margin-top: 8px; color: #888; font-size: 0.8rem;">
                        📚 來源：${q.source}
                    </div>
                `;
                reviewList.appendChild(reviewItem);
            });
        }

        function restartQuiz() {
            resultSection.style.display = 'none';
            setupSection.classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function exportResults() {
            let correct = 0;
            currentQuestions.forEach(q => {
                if (userAnswers[q.id] === q.answer) {
                    correct++;
                }
            });

            const total = currentQuestions.length;
            const accuracy = Math.round(correct / total * 100);

            let csvContent = '題號,題目,您的答案,正確答案,結果,解析,來源\n';

            currentQuestions.forEach((q, index) => {
                const userAnswer = userAnswers[q.id] || '未作答';
                const isCorrect = userAnswer === q.answer ? '正確' : '錯誤';
                const explanation = q.explanation ? q.explanation.replace(/,/g, '，').replace(/\n/g, ' ') : '';

                csvContent += `${index + 1},"${q.question.replace(/"/g, '""')}",${userAnswer},${q.answer},${isCorrect},"${explanation}","${q.source}"\n`;
            });

            csvContent += `\n總計,,${correct}/${total},,,正確率,${accuracy}%\n`;

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `AI應用規劃師考古題測驗結果_${new Date().toLocaleDateString()}.csv`;
            link.click();
        }
    </script>
